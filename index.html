<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Draw - Kết Nối Trực Tiếp</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #fff; }
        #setup-screen { position: fixed; inset: 0; background: #fff5f7; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        input { padding: 12px; border: 2px solid #ff4d6d; border-radius: 10px; margin-bottom: 10px; width: 80%; text-align: center; }
        canvas { display: block; touch-action: none; }
        .toolbar { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; display: none; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #ff4d6d; color: white; font-weight: bold; }
        .info { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="color: #ff4d6d;">Love Canvas P2P</h2>
        <p>Mã của bạn: <b id="my-id">...đang tạo...</b></p>
        <input type="text" id="peer-id-input" placeholder="Nhập mã của người ấy">
        <button onclick="connectToPeer()">Kết nối & Vẽ</button>
        <p class="info">Gửi mã của bạn cho người kia, hoặc nhập mã của họ để bắt đầu!</p>
    </div>

    <div class="toolbar" id="main-toolbar">
        <input type="color" id="myColor" value="#ff4d6d">
        <input type="range" id="mySize" min="1" max="15" value="3">
        <button onclick="ctx.clearRect(0,0,canvas.width,canvas.height)" style="background:#333">Xóa</button>
    </div>

    <canvas id="loveCanvas"></canvas>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');
        const myColor = document.getElementById('myColor');
        const mySize = document.getElementById('mySize');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round';

        // 1. Khởi tạo Peer (Tạo định danh cho máy mình)
        const peer = new Peer(); 
        let conn;

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // 2. Chờ máy kia kết nối tới mình
        peer.on('connection', (connection) => {
            conn = connection;
            setupChat();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-toolbar').style.display = 'flex';
        });

        // 3. Chủ động kết nối tới máy kia
        function connectToPeer() {
            const peerId = document.getElementById('peer-id-input').value;
            conn = peer.connect(peerId);
            setupChat();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-toolbar').style.display = 'flex';
        }

        function setupChat() {
            conn.on('data', (data) => {
                if (data.type === 'draw') {
                    // Vẽ bằng màu của CHÍNH MÁY MÌNH
                    ctx.strokeStyle = myColor.value;
                    ctx.lineWidth = mySize.value;
                    ctx.lineTo(data.x * canvas.width, data.y * canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(data.x * canvas.width, data.y * canvas.height);
                } else if (data.type === 'start' || data.type === 'end') {
                    ctx.beginPath();
                }
            });
        }

        // 4. Logic vẽ và gửi dữ liệu
        let drawing = false;

        function startDraw(e) {
            drawing = true;
            if(conn) conn.send({ type: 'start' });
            draw(e);
        }

        function endDraw() {
            drawing = false;
            if(conn) conn.send({ type: 'end' });
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing || !conn) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            // Gửi tọa độ cho máy kia
            conn.send({ type: 'draw', x: x / canvas.width, y: y / canvas.height });

            // Vẽ trên máy mình
            ctx.strokeStyle = myColor.value;
            ctx.lineWidth = mySize.value;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        canvas.addEventListener('touchend', endDraw);
    </script>
</body>
</html>
